<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ReviewPilot</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="layout">
      <header class="topbar">
        <div class="brand">
          <span class="logo">RP</span>
          <div>
            <h1>ReviewPilot</h1>
            <p>风险感知型 AI PR Review 助手</p>
          </div>
        </div>
        <div class="userbar">
          <span class="status hidden" id="userLabel"></span>
          <button id="settingsBtn" class="hidden" type="button">设置</button>
          <button id="logoutBtn" class="hidden" type="button">退出</button>
        </div>
      </header>

      <section id="authView" class="auth-grid">
        <form id="loginForm" class="panel auth-card">
          <h2>登录</h2>
          <label class="field">
            <span>账号</span>
            <input id="loginUsername" autocomplete="username" placeholder="例如 yang070">
          </label>
          <label class="field">
            <span>密码</span>
            <input id="loginPassword" type="password" autocomplete="current-password">
          </label>
          <button class="primary" type="submit">登录</button>
        </form>

        <form id="registerForm" class="panel auth-card">
          <h2>注册</h2>
          <label class="field">
            <span>账号</span>
            <input id="registerUsername" autocomplete="username" placeholder="字母、数字或下划线">
          </label>
          <label class="field">
            <span>密码</span>
            <input id="registerPassword" type="password" autocomplete="new-password">
          </label>
          <label class="field">
            <span>千问 API Key</span>
            <input id="registerApiKey" type="password" autocomplete="off" placeholder="sk-...">
          </label>
          <label class="field">
            <span>默认模型</span>
            <input id="registerDefaultModel" value="qwen-plus">
          </label>
          <button class="primary" type="submit">注册并登录</button>
        </form>
      </section>

      <section id="appView" class="workspace hidden">
        <aside class="panel input-panel">
          <label class="field">
            <span>公开 GitHub PR 链接</span>
            <input id="prUrl" placeholder="https://github.com/owner/repo/pull/1">
          </label>

          <div class="model-grid">
            <label class="field">
              <span>本次使用模型</span>
              <select id="modelPreset">
                <option value="qwen-plus">qwen-plus</option>
                <option value="qwen-plus-2025-07-28">qwen-plus-2025-07-28</option>
                <option value="qwen-long">qwen-long</option>
                <option value="qwen-max">qwen-max</option>
                <option value="custom">自定义</option>
              </select>
            </label>
            <label class="field hidden" id="customModelField">
              <span>自定义模型名</span>
              <input id="customModel" placeholder="例如 qwen-plus">
            </label>
          </div>

          <div class="or-line">或粘贴 unified diff</div>
          <label class="field grow">
            <span>代码变更 Diff</span>
            <textarea id="diffInput" spellcheck="false"></textarea>
          </label>
          <div class="actions">
            <button id="sampleBtn" type="button">加载样例</button>
            <button id="reviewBtn" type="button" class="primary">开始评审</button>
          </div>
        </aside>

        <section class="panel report-panel">
          <div id="operationStatus" class="operation-status hidden">
            <div>
              <strong id="operationTitle">正在评审</strong>
              <p id="operationText">正在准备分析上下文...</p>
            </div>
            <div class="progress-track"><span id="progressBar"></span></div>
          </div>

          <div class="report-head">
            <div>
              <h2 id="reportTitle">评审报告</h2>
              <p id="summaryText">输入公开 PR 链接或 diff 后开始分析。</p>
            </div>
            <span id="riskBadge" class="badge low">low</span>
          </div>

          <section class="result-section">
            <div class="section-head">
              <h3>顶部概览</h3>
              <button id="copySummaryBtn" type="button">复制摘要</button>
            </div>
            <div class="metrics">
            <div><span>文件数</span><strong id="fileCount">0</strong></div>
            <div><span>新增行数</span><strong id="additionCount">0</strong></div>
            <div><span>删除行数</span><strong id="deletionCount">0</strong></div>
            <div><span>风险数</span><strong id="findingCount">0</strong></div>
            <div><span>深度文件</span><strong id="evidenceCount">0</strong></div>
            <div><span>综合评分</span><strong id="overallScore">0</strong></div>
            </div>
          </section>

          <div class="section-grid">
            <section class="result-section">
              <h3>PR 概览</h3>
              <div id="overviewBox" class="stack"></div>
            </section>
            <section class="result-section">
              <h3>上下文覆盖范围</h3>
              <div id="coverageBox" class="stack"></div>
            </section>
          </div>

          <div class="section-grid">
            <section class="result-section">
              <h3>本次 PR 文件变更概览</h3>
              <div id="files" class="stack"></div>
            </section>
            <section class="result-section">
              <h3>Risk-Aware File Ranking</h3>
              <div id="priorityFiles" class="stack"></div>
            </section>
          </div>

          <div class="section-grid">
            <section class="result-section">
              <h3>Rule Findings</h3>
              <div id="ruleFindings" class="stack"></div>
            </section>
            <section class="result-section">
              <h3>主要变更模块</h3>
              <div id="modules" class="stack"></div>
            </section>
          </div>

          <div class="section-grid">
            <section class="result-section">
              <h3>AI Review Risks</h3>
              <div id="risks" class="stack"></div>
            </section>
            <section class="result-section">
              <h3>可复制 Review Comments</h3>
              <div id="comments" class="stack"></div>
            </section>
          </div>

          <div class="section-grid single">
            <section class="result-section">
              <h3>AI 分析限制</h3>
              <div id="limitations" class="stack"></div>
            </section>
          </div>
        </section>
      </section>
    </main>

    <dialog id="settingsDialog" class="settings-dialog">
      <form id="settingsForm" method="dialog">
        <div class="dialog-head">
          <h2>账号设置</h2>
          <button id="closeSettingsBtn" type="button">关闭</button>
        </div>
        <label class="field">
          <span>新的千问 API Key</span>
          <input id="settingsApiKey" type="password" placeholder="留空则不修改">
        </label>
        <label class="field">
          <span>默认模型</span>
          <input id="settingsDefaultModel" placeholder="qwen-plus">
        </label>
        <button class="primary" type="submit">保存设置</button>
      </form>
    </dialog>

    <dialog id="messageDialog" class="message-dialog">
      <div class="message-box">
        <div class="dialog-head">
          <h2 id="messageTitle">提示</h2>
          <button id="messageCloseBtn" type="button">关闭</button>
        </div>
        <p id="messageText"></p>
      </div>
    </dialog>

    <script src="/app.js"></script>
  </body>
</html>
